name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            electron-target: --win
            artifact-path: release/*.exe

          - os: macos-latest
            electron-target: --mac
            artifact-path: release/*.dmg

          - os: ubuntu-latest
            electron-target: --linux deb
            artifact-path: release/*.deb

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby ruby-dev upx-ucl
          sudo gem install fpm --no-document

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ matrix.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend
        working-directory: backend
        run: python -m PyInstaller build.spec --clean -y

      - name: Cache frontend npm
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-npm-${{ matrix.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cache root npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-npm-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install root deps
        run: npm ci

      - name: Build Electron package
        run: npx electron-builder ${{ matrix.electron-target }}
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: No-one-${{ matrix.os }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
